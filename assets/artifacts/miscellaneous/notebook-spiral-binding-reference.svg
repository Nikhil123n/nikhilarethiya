<svg xmlns="http://www.w3.org/2000/svg" width="92" height="900" viewBox="0 0 92 900" role="img" aria-labelledby="title desc">
  <title id="title">Editable notebook spiral binding</title>
  <desc id="desc">A reusable SVG notebook binding made from repeated black metal spiral loops, black punched tabs, and a brown book spine.</desc>
  <defs>
    <style>
      .spine-shadow { stroke: rgba(37, 22, 10, 0.2); stroke-width: 17; }
      .spine-core { stroke: url(#spineGradient); stroke-width: 10.5; }
      .spine-highlight { stroke: rgba(245, 197, 135, 0.52); stroke-width: 1.4; }
      .wire { fill: none; stroke: url(#wireGradient); stroke-width: 5.35; stroke-linecap: round; stroke-linejoin: round; }
      .wire-glint { fill: none; stroke: rgba(120, 116, 106, 0.48); stroke-width: 0.95; stroke-linecap: round; }
    </style>

    <linearGradient id="spineGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#321b0c"/>
      <stop offset="0.2" stop-color="#7a4a24"/>
      <stop offset="0.48" stop-color="#c58a52"/>
      <stop offset="0.76" stop-color="#7d4c27"/>
      <stop offset="1" stop-color="#271407"/>
    </linearGradient>

    <linearGradient id="wireGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.26" stop-color="#272521"/>
      <stop offset="0.48" stop-color="#050505"/>
      <stop offset="0.72" stop-color="#1b1a17"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>

    <filter id="softWireShadow" x="-24%" y="-42%" width="166%" height="190%">
      <feDropShadow dx="1.25" dy="2" stdDeviation="1.3" flood-color="#110d09" flood-opacity="0.34"/>
    </filter>

    <filter id="softSpineShadow" x="-25%" y="0" width="150%" height="100%">
      <feDropShadow dx="2" dy="0" stdDeviation="1.8" flood-color="#1d1209" flood-opacity="0.26"/>
    </filter>

    <g id="coil">
      <rect x="62.5" y="-11" width="24" height="27" rx="1.7" fill="#040404"/>
      <rect x="66" y="-8" width="14.5" height="21" rx="0.8" fill="#0a0a0a" opacity="0.95"/>
      <path class="wire" d="M4 -1.4 C17 -8 38.5 -8 52.5 -1.4 C59.5 2 65.5 2.3 74 2.3"/>
      <path class="wire" d="M4 13.8 C17 7.3 38.5 7.3 52.5 13.8 C59.5 17.2 65.5 17.4 74 17.4"/>
      <path class="wire" d="M74 2.3 C85 3 85 16.7 74 17.4"/>
      <path class="wire-glint" d="M11.5 0.2 C23.5 -3.2 39 -3 51 1.1"/>
      <path class="wire-glint" d="M11.5 12.4 C23.5 9.4 39 9.4 51 13.2"/>
    </g>
  </defs>

  <rect width="92" height="900" fill="none"/>

  <g filter="url(#softSpineShadow)" fill="none" stroke-linecap="round">
    <path class="spine-shadow" d="M17 10 C15.5 124 15.5 262 15.5 390 C15.5 532 15.5 704 17 890"/>
    <path class="spine-core" d="M21.5 8 C20 126 20 264 20 390 C20 532 20 706 21.5 892"/>
    <path class="spine-highlight" d="M25.4 18 C24.5 160 24.4 334 24.4 508 C24.4 664 24.6 786 25.8 882"/>
  </g>

  <g filter="url(#softWireShadow)">
    <use href="#coil" transform="translate(0 43)"/>
    <use href="#coil" transform="translate(0 147)"/>
    <use href="#coil" transform="translate(0 251)"/>
    <use href="#coil" transform="translate(0 355)"/>
    <use href="#coil" transform="translate(0 459)"/>
    <use href="#coil" transform="translate(0 563)"/>
    <use href="#coil" transform="translate(0 667)"/>
    <use href="#coil" transform="translate(0 771)"/>
    <use href="#coil" transform="translate(0 875)"/>
  </g>
</svg>
