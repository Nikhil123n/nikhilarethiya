name: Bug Report
description: Report a broken behavior, layout issue, or regression.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include viewport size and browser when relevant.
      placeholder: |
        1. Open ...
        2. Scroll to ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video
      description: Drag screenshots here for visual bugs.
