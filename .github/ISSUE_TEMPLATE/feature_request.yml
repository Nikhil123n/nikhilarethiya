name: Feature Request
description: Suggest an improvement to the portfolio.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or design.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Add references, screenshots, or constraints.
